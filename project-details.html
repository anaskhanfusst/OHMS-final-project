<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Blueprint Specifications - OHMS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detail-card {
            background-color: white;
            border-radius: 8px;
            padding: 24px;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        .project-banner-wrapper {
            width: 100%;
            background-color: ghostwhite;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid lightgray;
        }
        .project-banner {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            display: none;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
            padding: 16px;
            background-color: ghostwhite;
            border-radius: 6px;
        }
        .meta-item h4 {
            margin: 0 0 4px 0;
            color: darkgray;
            font-size: 12px;
            text-transform: uppercase;
        }
        .meta-item p {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
        }
        .abstract-box {
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 15px;
        }
        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .member-card {
            border: 1px solid lightgray;
            padding: 16px;
            border-radius: 6px;
            background-color: white;
        }
        .member-card h4 {
            margin: 0 0 8px 0;
            color: midnightblue;
        }
        .member-card p {
            margin: 4px 0;
            font-size: 13px;
        }
        .btn-download {
            display: inline-block;
            margin-top: 8px;
            padding: 6px 12px;
            background-color: steelblue;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <img src="bigbird.png" alt="Open House Logo">
            </div>
            <div>
                <div class="brand-name">Open House</div>
                <div class="brand-sub">Management System</div>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a>
            <a href="projects.html"><span class="nav-icon">✅</span><span>Approved Projects</span></a>
            <a href="add-project.html"><span class="nav-icon">➕</span><span>Add Project</span></a>
            <a href="my-projects.html"><span class="nav-icon">📁</span><span>My Projects</span></a>
        </nav>
        
        <div class="sidebar-footer-container">
            <div class="custom-credits">
                Developed by a <sup>2</sup> Group
            </div>
            <a href="#" onclick="logout()" class="logout-link"><span class="nav-icon">🚪</span><span>Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <div>
                <h1 id="detTitle">Loading Project Title...</h1>
                <p id="detId" style="color:darkgray; font-family:monospace;"></p>
            </div>
        </div>

        <div class="detail-card">
            <div class="project-banner-wrapper">
                <img id="detImage" class="project-banner" alt="Project Banner">
            </div>

            <div class="meta-grid">
                <div class="meta-item">
                    <h4>Classification Category</h4>
                    <p id="detCategory">---</p>
                </div>
                <div class="meta-item">
                    <h4>Research Supervisor</h4>
                    <p id="detSupervisor">---</p>
                </div>
                <div class="meta-item">
                    <h4>Submission Status</h4>
                    <p id="detStatus">---</p>
                </div>
                <div class="meta-item">
                    <h4>Submitted By</h4>
                    <p id="detAuthor">---</p>
                </div>
            </div>

            <h3>Project Abstract Blueprint</h3>
            <div id="detAbstract" class="abstract-box">---</div>

            <hr style="border: 0; border-top: 1px solid lightgray; margin: 24px 0;">

            <h3>Assembled Group Members</h3>
            <div id="detMembers" class="member-grid"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
